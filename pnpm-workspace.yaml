  '@sentry/cli': true
  '@swc/core': true
  contentlayer2: true
  core-js: true
  core-js-pure: true
  esbuild: true
  msw: true
  onnxruntime-node: true
  protobufjs: true
  redis-memory-server: true
  sharp: true
