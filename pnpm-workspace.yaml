packages:
  - "apps/*"
  - "packages/*"
  - "scripts"

publicHoistPattern:
  - "*import-in-the-middle*"
  - "*require-in-the-middle*"

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - next
  - "@next/*"
  - react
  - react-dom
  # Renovate security update: protobufjs@7.6.3 || 7.6.5
  - protobufjs@7.6.3 || 7.6.5
  - vite@7.1.11 || 7.3.2 || 7.3.5
  - webpack@5.104.0 || 5.104.1
  - mdast-util-to-hast@13.2.1
  - minimatch@9.0.6 || 9.0.7
  - tar@7.5.10 || 7.5.11 || 7.5.16 || 7.5.17 || 7.5.18 || 7.5.19
  - undici@7.24.0 || 7.28.0
  - fast-xml-parser@5.5.6 || 5.5.7 || 5.7.0
  - brace-expansion@2.0.3 || 2.1.2 || 5.0.5 || 5.0.6 || 5.0.7
  - yaml@2.8.3
  - lodash@4.17.24
  - postcss@8.5.10
  - immutable@5.1.5 || 5.1.8
  - dompurify@3.3.4 || 3.4.0 || 3.4.6 || 3.4.7 || 3.4.8 || 3.4.9 || 3.4.11 || 3.4.12
  - fast-uri@3.1.1 || 3.1.2 || 3.1.3 || 3.1.4
  - fast-xml-builder@1.1.7
  - ws@8.20.1 || 8.21.0
  - uuid@11.1.1
  - qs@6.15.2
  - '@grpc/grpc-js@1.13.5 || 1.14.4'
  - tmp@0.2.6
  - esbuild@0.28.1
  - '@opentelemetry/core@2.8.0'
  - js-yaml@3.15.0 || 4.1.2 || 4.3.0
  - '@babel/core@7.29.1'
  - '@opentelemetry/propagator-jaeger@2.9.0'
  - svgo@4.0.2
  - sharp@0.35.0

catalog:
  "@ai-sdk/react": "3.0.118"
  "@biomejs/biome": "2.5.1"
  "@supabase/supabase-js": "2.99.2"
  "@tailwindcss/postcss": "4.2.2"
  "@types/node": "24.10.4"
  "@types/react": "19.2.16"
  "@types/react-dom": "19.2.3"
  "ai": "6.0.116"
  "next": "16.2.11"
  "postcss": "8.5.15"
  "react": "19.2.7"
  "react-dom": "19.2.7"
  "tailwindcss": "4.2.2"
  "tsx": "4.19.3"
  "typescript": "5.9.3"
  "zod": "^4.3.6"

overrides:
  "@babel/runtime@<7.26.10": ">=7.26.10"
  "@opentelemetry/auto-instrumentations-node": "0.76.0"
  "@opentelemetry/exporter-prometheus": "0.218.0"
  "@opentelemetry/exporter-trace-otlp-http": "0.218.0"
  "@opentelemetry/sdk-node": "0.218.0"
  "fast-xml-parser@>=4.3.6 <=5.3.3": ">=5.3.7"
  "protobufjs@<7.5.8": "7.6.5"
  "protobufjs@>=8.0.0 <8.2.0": "8.4.0"
